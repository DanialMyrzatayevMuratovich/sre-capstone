version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinemahub_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - MONGO_URI=${MONGO_URI}
      - MONGO_DATABASE=${MONGO_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=24h
    networks:
      - cinemahub_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinemahub_frontend
    ports:
      - "3000:80"
    networks:
      - cinemahub_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  cinemahub_network:
    name: cinemahub_network
    driver: bridge
